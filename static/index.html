<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent</title>
    <link rel="icon" type="image/png" href="/static/gpt.png">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="sidebar-open">
    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-inner">
                <div class="sidebar-top">
                    <div class="brand">
                        <span class="brand-mark" aria-hidden="true">
                            <img src="/static/gpt.png" alt="AI Agent">
                        </span>
                        <div>
                            <div class="brand-name">AI Agent</div>
                            <div class="brand-subtitle">General Assistant</div>
                        </div>
                    </div>
                </div>

                <button class="new-chat-btn" id="new-chat-btn" type="button">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="18" width="18" aria-hidden="true">
                        <path d="M12 5v14"></path>
                        <path d="M5 12h14"></path>
                    </svg>
                    <span>新建对话</span>
                </button>

                <div class="sidebar-nav">
                    <button class="section-toggle" id="recent-toggle" type="button">
                        <span class="section-toggle-left">
                            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="18" width="18" aria-hidden="true">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                            </svg>
                            <span>最近会话</span>
                        </span>
                        <svg class="chevron" stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="16" width="16" aria-hidden="true">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                </div>

                <div class="session-list" id="session-list"></div>
            </div>
        </aside>

        <div class="mobile-overlay" id="mobile-overlay"></div>

        <main class="main-content">
            <div class="header">
                <button class="toggle-sidebar-btn" id="toggle-sidebar-btn" type="button" title="显示或隐藏侧边栏">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="20" width="20" aria-hidden="true">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="header-title">AI Agent</div>
                <div class="ghost-slot" aria-hidden="true"></div>
            </div>

            <div class="chat-container" id="chat-container"></div>

            <div class="search-drawer-overlay" id="search-drawer-overlay"></div>
            <aside class="search-drawer" id="search-drawer" aria-hidden="true">
                <div class="search-drawer-header">
                    <div class="search-drawer-title">搜索结果</div>
                    <button class="search-drawer-close" id="search-drawer-close" type="button" title="关闭">
                        <svg stroke="currentColor" fill="none" stroke-width="2.2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="20" width="20" aria-hidden="true">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="search-drawer-body" id="search-drawer-body"></div>
            </aside>

            <div class="input-area">
                <div class="composer-shell">
                    <div class="file-chip-list" id="file-chip-list"></div>
                    <div class="input-box">
                        <label class="icon-button" title="上传文件或图片">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M21.2 15c.7-1.2 1-2.5.7-3.9-.6-2-2.4-3.5-4.4-3.5h-1.2c-.7-3-3.2-5.2-6.2-5.6-3-.3-5.9 1.3-7.3 4-1.2 2.5-1 6.5.5 8.4"></path>
                                <path d="M12 22v-9"></path>
                                <path d="M8 17l4-4 4 4"></path>
                            </svg>
                            <input type="file" id="file-input" multiple accept=".pdf,.txt,.md,.csv,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg,.webp,.gif,image/*">
                        </label>

                        <textarea id="message-input" rows="1" placeholder="给 AI Agent 发消息，上传文档后提问，或直接发图片做 OCR / 图像理解"></textarea>

                        <button class="search-toggle" id="search-toggle" type="button" title="开启或关闭联网搜索">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="M21 21l-4.35-4.35"></path>
                            </svg>
                            <span>联网搜索</span>
                        </button>

                        <button class="send-button" id="send-button" type="button" title="发送">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    <div class="composer-hint">支持 PDF、TXT、Excel、Word 与常见图片格式；搜索网页结果可在答案末尾展开右侧侧栏查看。</div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/main.js?v=20260602-1"></script>
</body>
</html>
